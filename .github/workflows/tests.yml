name: Tests

on:
    pull_request:
        branches: [main, dev]

jobs:
    tests:
        name: PHPUnit
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: "8.4"
                  tools: composer

            - name: Install dependencies
              run: composer install --prefer-dist --no-interaction --no-progress --no-scripts

            - name: Run tests
              run: composer test
              env:
                  APP_ENV: test
                  APP_SECRET: ci_secret
