name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: PHP CS Fixer
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: Run PHP CS Fixer
        run: composer cs-check

  analyse:
    name: PHPStan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: Warm up cache (needed by PHPStan Symfony extension)
        run: php bin/console cache:warmup --env=dev
        env:
          APP_ENV: dev
          APP_SECRET: ci_secret

      - name: Run PHPStan
        run: composer phpstan
